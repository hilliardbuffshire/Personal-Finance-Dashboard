  var ver=localStorage.getItem('hb_schema_ver');

const endRef=useRef(null);
const inputRef=useRef(null);
useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,loading]);
useEffect(()=>{ if(open){setUnread(0);setTimeout(()=>inputRef.current?.focus(),200);} },[open]);
const saveKey=(k,p)=>{ LS.set('hb_ai_key',k); LS.set('hb_ai_prov',p); };

const buildContext=()=>`당신은 Hilliard Buffshire의 개인 재무 AI 어드바이저입니다.
현재 재무 현황:
• 순자산(Net Worth): ${$$(netWorth)} (자산 ${$$(totalAssets)} − 부채 ${$$(totalDAmt)})
• 현금 잔고: ${$$(currentBalance)}
• 투자 자산: ${$$(totalInvBal)}
• 월 수입: ${$$(totalInc)} / 월 지출: ${$$(totalExp)} / 월 순현금흐름: ${$$(netFlow)}
• 수입: ${incomes.length?incomes.map(i=>i.name+' '+$$(i.type==='annual'?i.amount/12:i.amount)+'/월').join(', '):'없음'}
• 지출: ${expenses.length?expenses.map(e=>e.name+' '+$$(e.amount)).join(', '):'없음'}
• 부채: ${debts.length?debts.map(d=>d.name+' 잔액'+$$(d.totalAmount)+' 월상환'+$$(d.monthlyPayment)+' 금리'+d.interestRate+'%').join(', '):'없음'}
• 투자: ${investments.length?investments.map(i=>i.name+' '+$$(i.balance)+' 기대수익'+i.expectedReturn+'%').join(', '):'없음'}
위 데이터를 기반으로 실용적이고 구체적인 재무 조언을 한국어로 제공하세요. 응답은 간결하고 핵심 위주로 해주세요.`;

const send=async(text)=>{
  const q=(text||input).trim();
  if(!q||loading) return;
  if(!apiKey){setShowCfg(true);return;}
  setMessages(p=>[...p,{role:'user',content:q}]);
  setInput('');
  setLoading(true);
  try{
    let reply='';
    const ctx=buildContext();
    if(provider==='gemini'){
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
        {method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{role:'user',parts:[{text:ctx+'\n\n질문: '+q}]}],
        generationConfig:{temperature:0.7,maxOutputTokens:1024}})});
      const d=await r.json();
      if(d.error) throw new Error(d.error.message);
      reply=d.candidates?.[0]?.content?.parts?.[0]?.text||'응답 없음';
    } else if(provider==='grok'){
      const r=await fetch('https://api.x.ai/v1/chat/completions',
        {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
        body:JSON.stringify({model:'grok-beta',messages:[{role:'system',content:ctx},{role:'user',content:q}],
        temperature:0.7,max_tokens:1024})});
      const d=await r.json();
      if(d.error) throw new Error(typeof d.error==='string'?d.error:d.error.message);
      reply=d.choices?.[0]?.message?.content||'응답 없음';
    } else {
      const r=await fetch('https://api.openai.com/v1/chat/completions',
        {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
        body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:ctx},{role:'user',content:q}],
        temperature:0.7,max_tokens:1024})});
      const d=await r.json();
      if(d.error) throw new Error(d.error.message);
      reply=d.choices?.[0]?.message?.content||'응답 없음';
    }
    setMessages(p=>[...p,{role:'ai',content:reply}]);
    if(!open) setUnread(n=>n+1);
  }catch(e){
    setMessages(p=>[...p,{role:'ai',content:'❌ '+e.message+'\n\nAPI 키와 공급자를 확인해주세요. ⚙️ 설정에서 변경 가능합니다.'}]);
  } finally{ setLoading(false); }
};

balance:currentBalance, goal:savingsGoal, months:projMonths,
incomes, expenses, debts, investments, transactions,
updatedAt: new Date().toISOString()
})
.then(()=>setSyncStatus('saved'))
.catch(e=>{ console.warn('Firestore save:', e); setSyncStatus('error'); });
}, 2000);
},[currentBalance,savingsGoal,projMonths,incomes,expenses,debts,investments,transactions]);
useEffect(()=>{
document.body.style.background=theme.pageBg;
document.documentElement.style.setProperty('--focus-color',theme.focus);
},[theme]);
const totalInc=useMemo(()=>incomes.reduce((s,i)=>s+(i.type==='annual'?i.amount/12:i.amount),0),[incomes]);
const totalExp=useMemo(()=>expenses.reduce((s,e)=>s+e.amount,0),[expenses]);
const totalDPay=useMemo(()=>debts.reduce((s,d)=>s+d.monthlyPayment,0),[debts]);
const totalDAmt=useMemo(()=>debts.reduce((s,d)=>s+d.totalAmount,0),[debts]);
const totalInvBal=useMemo(()=>investments.reduce((s,i)=>s+i.balance,0),[investments]);
const totalAssets=currentBalance+totalInvBal;
const netWorth=totalAssets-totalDAmt;
const netFlow=totalInc-totalExp-totalDPay;
const projData=useMemo(()=>{
let bal=currentBalance;
let ds=debts.map(d=>({...d,rem:d.totalAmount}));
let ivs=investments.map(i=>({...i,bal:i.balance}));
const rows=[];
for(let m=0;m<=projMonths;m++){
const dTotal=ds.reduce((s,d)=>s+Math.max(0,d.rem),0);
const iTotal=ivs.reduce((s,i)=>s+i.bal,0);
rows.push({m,label:m===0?'현재':m%12===0?`${m/12}년`:`${m}개월`,
balance:Math.round(bal),debt:Math.round(dTotal),investments:Math.round(iTotal),
netWorth:Math.round(bal+iTotal-dTotal)});
if(m<projMonths){
let paid=0;
ds=ds.map(d=>{
if(d.rem<=0)return d;
const interest=d.rem*(d.interestRate/100/12);
const payment=Math.min(d.monthlyPayment,d.rem+interest);
paid+=payment;
return{...d,rem:Math.max(0,d.rem+interest-payment)};
});
ivs=ivs.map(i=>({...i,bal:i.bal*(1+i.expectedReturn/100/12)+i.monthlyContribution}));
bal+=totalInc-totalExp-paid;
}
}
return rows;
},[currentBalance,debts,investments,projMonths,totalInc,totalExp]);
const milestones=useMemo(()=>{
const r=[];

const df=projData.find(d=>d.debt<=0&&d.m>0);
if(df) r.push({icon:'🔓',label:'부채 완전 상환',month:df.m});
const pn=projData.find(d=>d.netWorth>=0&&d.m>0);
if(pn&&netWorth<0) r.push({icon:'📈',label:'순자산 플러스 전환',month:pn.m});
return r;
},[projData,savingsGoal,netWorth]);

{l:'월 순 현금흐름',v:(netFlow>=0?'+':'')+$$(netFlow),sub:netFlow>=0?'💚 저축 가능':'⚠️ 지출 초과',c:netFlow>=0?'#3b82f6':'#f97316',border:netFlow>=0?'#bfdbfe':'#fed7aa'},

{l:'순자산 (Net Worth)',v:$$(netWorth),sub:`총자산 - 부채 ${$$(totalDAmt)}`,c:netWorth>=0?theme.tabActive:'#ef4444',border:netWorth>=0?'#fef3c7':'#fecaca'},
];

<div style={{color:'rgba(255,255,255,0.8)',fontSize:11,letterSpacing:1,fontWeight:500,marginTop:3}}>힐리아드 버프셔 재무 관리 스테이션</div>

{(()=>{const _sr=totalInc>0?(netFlow/totalInc)*100:0;const _nd=debts.length===0;const _hi=debts.find(d=>d.interestRate>=20);const _msgs=[netFlow<0?{e:'🚨',t:'지출 초과',d:$(-netFlow)+' 초과 — 지출을 줄여봐요',c:'#dc2626',bg:'linear-gradient(135deg,#fef2f2,#fff5f5)'}:null,_hi?{e:'💸',t:'고금리 부채',d:_hi.name+' '+_hi.interestRate+'% — 우선 상환 권장',c:'#d97706',bg:'linear-gradient(135deg,#fffbeb,#fefce8)'}:null,_sr>=30?{e:'🔥',t:'저축률 최상',d:_sr.toFixed(0)+'% 저축 — 목표 금세 달성해요!',c:'#16a34a',bg:'linear-gradient(135deg,#f0fdf4,#ecfdf5)'}:null,_sr>=20?{e:'💪',t:'저축 우수',d:_sr.toFixed(0)+'% 저축 — 착실히 달려가고 있어요',c:'#2563eb',bg:'linear-gradient(135deg,#eff6ff,#f0f9ff)'}:null,_sr>=10?{e:'👍',t:'저축 양호',d:_sr.toFixed(0)+'% 저축 — 조금 더 늘리면 훨씬 빨라져요',c:'#7c3aed',bg:'linear-gradient(135deg,#f5f3ff,#faf5ff)'}:null,_nd&&_sr>=5?{e:'✨',t:'부채 제로',d:'부채 없이 '+_sr.toFixed(0)+'% 저축 — 완벽한 재무 건강!',c:'#0891b2',bg:'linear-gradient(135deg,#ecfeff,#f0fdfa)'}:null,netWorth>0?{e:'📈',t:'순자산 플러스',d:'순자산 '+$(netWorth)+' — 자산이 부채보다 많아요',c:'#4f46e5',bg:'linear-gradient(135deg,#eef2ff,#f5f3ff)'}:null,investments.length>0?{e:'🌱',t:'투자 성장 중',d:investments.length+'개 계좌 운용 — 돈이 나 대신 일하고 있어요',c:'#059669',bg:'linear-gradient(135deg,#ecfdf5,#f0fdf4)'}:null].filter(Boolean);const _m=_msgs[0]||{e:'💡',t:'재무 관리 시작',d:'수입과 지출을 입력해서 목표를 설정해봐요!',c:'#6366f1',bg:'linear-gradient(135deg,#ede9fe,#f5f3ff)'};return <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',background:_m.bg,borderRadius:12,marginBottom:14,border:'1px solid '+_m.c+'20',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}><span style={{fontSize:22,flexShrink:0}}>{_m.e}</span><div><span style={{fontSize:11,fontWeight:800,color:_m.c,letterSpacing:.5,textTransform:'uppercase'}}>{_m.t}</span><span style={{fontSize:12,color:'#374151',marginLeft:8}}>{_m.d}</span></div></div>;})()} {tab==='overview'&&<OverviewTab incomes={incomes} setInc={setInc} expenses={expenses} setExp={setExp} debts={debts} setDbt={setDbt} totalInc={totalInc} totalExp={totalExp} totalDPay={totalDPay} netFlow={netFlow} transactions={transactions} theme={theme}/>}
{tab==='ledger'&&<LedgerTab transactions={transactions} setTx={setTx} expenses={expenses} theme={theme}/>}
{tab==='investments'&&<InvestmentTab investments={investments} setInv={setInv}/>}
{tab==='projection'&&<ProjectionTab currentBalance={currentBalance} setCB={setCB} savingsGoal={savingsGoal} setSG={setSG} projMonths={projMonths} setPM={setPM} projData={projData.filter((_,i)=>i%Math.max(1,Math.floor(projMonths/20))===0)} milestones={milestones} totalInc={totalInc} totalExp={totalExp} totalDPay={totalDPay}/>}
<div style={{textAlign:'center',fontSize:10,color:'#cbd5e1',marginTop:20,paddingBottom:20}}>
Hilliard Buffshire Personal Finance Dashboard
{FB_READY?' · ☁️ Firebase 동기화 활성화':' · 💾 로컬 저장 모드'}
</div>

{}
{showThemePicker&&<div onClick={()=>setShowThemePicker(false)} style={{position:'fixed',inset:0,zIndex:90}}/>}
{}
<AIAdvisor
  netWorth={netWorth} totalInc={totalInc} totalExp={totalExp} netFlow={netFlow}

</div>
);
}
