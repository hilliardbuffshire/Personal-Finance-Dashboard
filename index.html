<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;
const { AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
        LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
        Legend, ResponsiveContainer } = Recharts;

/* ══════════════════════════════════════════
   1. STORAGE (localStorage + in-memory fallback)
══════════════════════════════════════════ */
let _mem = {};
const LS = {
  get:(k,fb)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return _mem[k]!==undefined?_mem[k]:fb;} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{_mem[k]=v;} },
  del:(k)=>{ try{localStorage.removeItem(k);}catch{delete _mem[k];} },
};

/* ══════════════════════════════════════════
   2. AUTH
══════════════════════════════════════════ */
const Auth={
  users:()=>LS.get('hb_users',[]),
  register:(u,p)=>{
    const un=u.trim().toLowerCase();
    if(!un||un.length<2)return{ok:false,msg:'아이디는 2자 이상이어야 합니다.'};
    if(!p||p.length<4)return{ok:false,msg:'비밀번호는 4자 이상이어야 합니다.'};
    if(localStorage.getItem(`hb_pw_${un}`)||_mem[`hb_pw_${un}`])return{ok:false,msg:'이미 존재하는 아이디입니다.'};
    LS.set(`hb_pw_${un}`,p);
    const us=Auth.users(); if(!us.includes(un))LS.set('hb_users',[...us,un]);
    return{ok:true,user:un};
  },
  login:(u,p)=>{
    const un=u.trim().toLowerCase();
    const stored=LS.get(`hb_pw_${un}`,null);
    if(!stored)return{ok:false,msg:'존재하지 않는 아이디입니다.'};
    if(stored!==p)return{ok:false,msg:'비밀번호가 틀렸습니다.'};
    return{ok:true,user:un};
  },
  session:()=>LS.get('hb_session',null),
  save:(u)=>LS.set('hb_session',u),
  clear:()=>LS.del('hb_session'),
};

/* ══════════════════════════════════════════
   3. CONSTANTS & DEFAULTS
══════════════════════════════════════════ */
const DEF_INC=[{id:1,name:'월급 (Salary)',amount:4500,type:'monthly'}];
const DEF_EXP=[{id:1,name:'렌트 (Rent)',amount:1500,category:'주거'},{id:2,name:'식비 (Food)',amount:500,category:'식비'},{id:3,name:'교통비',amount:150,category:'교통'}];
const DEF_DBT=[{id:1,name:'신용카드 (Credit Card)',totalAmount:5000,monthlyPayment:300,interestRate:19.99}];
const DEF_INV=[{id:1,name:'주식 포트폴리오 (Stocks)',balance:0,monthlyContribution:200,type:'stock',expectedReturn:7}];
const DEF_TXN=[];

const CAT_COLORS={주거:'#3b82f6',식비:'#f59e0b',교통:'#10b981',의료:'#ef4444',교육:'#8b5cf6',쇼핑:'#f97316',여가:'#06b6d4',수입:'#22c55e',기타:'#6b7280'};
const INV_COLORS={stock:'#3b82f6',crypto:'#f59e0b',realEstate:'#10b981',savings:'#8b5cf6',other:'#6b7280'};
const INV_LABELS={stock:'주식 (Stock)',crypto:'코인 (Crypto)',realEstate:'부동산',savings:'예적금',other:'기타'};
const PIE_PAL=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#f97316','#06b6d4','#ec4899','#6b7280'];
const CAT_LIST=['주거','식비','교통','의료','교육','쇼핑','여가','기타'];

const THEMES=[
  {name:'Purple',  dot:'#667eea', bg:'#f5f3ff', header:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)', netBar:'linear-gradient(135deg,#764ba2,#4f46e5)', tabBg:'#ffffff', tabActive:'#4f46e5', accent:'#c9a84c', cardBg:'#ffffff', tx:'#1f2937', txMuted:'#9ca3af', border:'#e2e8f0', badgeBg:'rgba(167,139,250,0.2)', badgeBr:'rgba(167,139,250,0.4)'},
  {name:'Signiel', dot:'#FAF8F4', bg:'#FAF8F4', header:'#18140F',                                          netBar:'#1A1612',                                    tabBg:'#FFFFFF',  tabActive:'#A88040', accent:'#C9A96E', cardBg:'#FFFFFF',  tx:'#1A1612', txMuted:'#A89880', border:'#E8E0D4', badgeBg:'rgba(201,169,110,0.12)', badgeBr:'rgba(201,169,110,0.3)'},
  {name:'Obsidian',dot:'#0E0C09', bg:'#0E0C09', header:'#0A0907',                                          netBar:'#17140F',                                    tabBg:'#1E1B15',  tabActive:'#C9A96E', accent:'#E8C870', cardBg:'#1E1B15',  tx:'#F0EBE2', txMuted:'#7A6A55', border:'#2E2820', badgeBg:'rgba(201,169,110,0.08)', badgeBr:'rgba(201,169,110,0.2)'},
];

let _uid=500; const gid=()=>++_uid;

/* ══════════════════════════════════════════
   4. FORMATTERS
══════════════════════════════════════════ */
const fmt=v=>{if(v==null)return'$0';const a=Math.abs(v),s=v<0?'-':'';return a>=1e6?`${s}$${(a/1e6).toFixed(2)}M`:a>=1e3?`${s}$${(a/1e3).toFixed(1)}K`:`${s}$${a.toFixed(0)}`;};
const $$=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(v??0);
const monthKey=(d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const monthLabel=k=>{const[y,m]=k.split('-');const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${mn[+m-1]} ${y}`;};
const prevMonth=k=>{const[y,m]=k.split('-').map(Number);return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;};
const nextMonth=k=>{const[y,m]=k.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;};

/* ══════════════════════════════════════════
   5. SVG ICONS
══════════════════════════════════════════ */
const I=(p)=><svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p.children}</svg>;
const IcoPlus =({s=12})=><I s={s}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></I>;
const IcoTrash=({s=13})=><I s={s}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></I>;
const IcoEdit =({s=13})=><I s={s}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5l3 3L12 15l-4 1 1-4z"/></I>;
const IcoCheck=({s=12})=><I s={s}><polyline points="20 6 9 17 4 12"/></I>;
const IcoLeft =({s=18})=><I s={s}><polyline points="15 18 9 12 15 6"/></I>;
const IcoRight=({s=18})=><I s={s}><polyline points="9 18 15 12 9 6"/></I>;
const IcoUser =({s=15})=><I s={s}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></I>;
const IcoOut  =({s=14})=><I s={s}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></I>;
const IcoDn   =({s=15})=><I s={s}><polyline points="6 9 12 15 18 9"/></I>;
const IcoUp   =({s=15})=><I s={s}><polyline points="18 15 12 9 6 15"/></I>;

/* ══════════════════════════════════════════
   6. SHARED UI COMPONENTS
══════════════════════════════════════════ */
function Tip({active,payload,label}){
  if(!active||!payload?.length)return null;
  return(<div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:12,padding:'10px 14px',boxShadow:'0 4px 20px rgba(0,0,0,0.1)',fontSize:12}}>
    <p style={{fontWeight:700,marginBottom:6,color:'#374151'}}>{label}</p>
    {payload.map((p,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
      <span style={{color:p.color}}>●</span><span style={{color:'#6b7280'}}>{p.name}:</span>
      <span style={{fontWeight:700,color:p.color}}>{$$(p.value)}</span>
    </div>)}
  </div>);
}

function PieTip({active,payload}){
  if(!active||!payload?.length)return null;
  const p=payload[0];
  return(<div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:10,padding:'8px 12px',fontSize:12,boxShadow:'0 4px 20px rgba(0,0,0,0.1)'}}>
    <span style={{color:p.payload.fill}}>● </span><strong>{p.name}</strong><br/>
    <span style={{color:'#374151'}}>{$$(p.value)}</span>
  </div>);
}

function EditRow({item,fields,onSave,onDelete,bg='bg-gray-50'}){
  const [ed,setEd]=useState(false);
  const mk=()=>Object.fromEntries(fields.map(f=>[f.key,item[f.key]]));
  const [v,setV]=useState(mk);
  const save=()=>{onSave(item.id,v);setEd(false);};
  const cancel=()=>{setV(mk());setEd(false);};
  const set=(k,val)=>setV(p=>({...p,[k]:val}));
  if(ed)return(
    <div className="mb-2 p-3 rounded-xl border border-yellow-300 bg-yellow-50">
      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(fields.length,2)},1fr)`,gap:6}}>
        {fields.map(f=><div key={f.key}>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>{f.label}</div>
          {f.type==='select'
            ?<select value={v[f.key]} onChange={e=>set(f.key,e.target.value)} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'6px 8px',fontSize:13,background:'white'}}>
               {f.opts.map(o=><option key={o} value={o}>{f.optLabels?f.optLabels[o]:o}</option>)}
             </select>
            :<input type={f.type||'text'} value={v[f.key]} onChange={e=>set(f.key,f.type==='number'?parseFloat(e.target.value)||0:e.target.value)} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'6px 8px',fontSize:13}}/>
          }
        </div>)}
      </div>
      <div style={{display:'flex',gap:6,marginTop:8}}>
        <button onClick={save} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'#22c55e',color:'white',border:'none',borderRadius:8,fontSize:12,fontWeight:600}}><IcoCheck/>저장</button>
        <button onClick={cancel} style={{padding:'5px 10px',background:'#e5e7eb',border:'none',borderRadius:8,fontSize:12}}>취소</button>
      </div>
    </div>
  );
  const amt=item.amount??item.monthlyPayment??0;
  return(
    <div className={`flex items-center justify-between px-3 py-2 rounded-xl mb-1.5 ${bg}`}>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:13,fontWeight:600,color:'#1f2937'}}>{item.name}</span>
        {item.category&&<span style={{marginLeft:6,fontSize:11,background:'rgba(255,255,255,0.7)',padding:'2px 7px',borderRadius:20,color:'#6b7280'}}>{item.category}</span>}
        {item.type&&item.type!=='monthly'&&item.type!=='stock'&&item.type!=='crypto'&&item.type!=='realEstate'&&item.type!=='savings'&&item.type!=='other'&&<span style={{marginLeft:6,fontSize:11,background:'#fef3c7',padding:'2px 7px',borderRadius:20,color:'#92400e'}}>1회성</span>}
        {item.interestRate!=null&&<span style={{marginLeft:6,fontSize:11,color:'#ef4444',fontWeight:600}}>{item.interestRate}%</span>}
        {item.expectedReturn!=null&&<span style={{marginLeft:6,fontSize:11,color:'#3b82f6',fontWeight:600}}>+{item.expectedReturn}%/yr</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:6}}>
        {item.totalAmount!=null&&<span style={{fontSize:11,color:'#9ca3af'}}>잔액 {$$(item.totalAmount)}</span>}
        {item.balance!=null&&<span style={{fontSize:12,fontWeight:700,color:'#1f2937'}}>{$$(item.balance)}</span>}
        {item.balance==null&&<span style={{fontSize:12,fontWeight:700,color:'#1f2937'}}>{$$(amt)}/월</span>}
        <button onClick={()=>setEd(true)} style={{padding:4,color:'#60a5fa',background:'none',border:'none',borderRadius:6,display:'flex'}}><IcoEdit/></button>
        <button onClick={()=>onDelete(item.id)} style={{padding:4,color:'#f87171',background:'none',border:'none',borderRadius:6,display:'flex'}}><IcoTrash/></button>
      </div>
    </div>
  );
}

function AddForm({fields,onAdd,label}){
  const init=Object.fromEntries(fields.map(f=>[f.key,f.def!==undefined?f.def:f.type==='number'?0:'']));
  const [v,setV]=useState({...init});
  const [open,setOpen]=useState(false);
  const set=(k,val)=>setV(p=>({...p,[k]:val}));
  const doAdd=()=>{if(!v[fields[0].key])return;onAdd({...v,id:gid()});setV({...init});setOpen(false);};
  if(!open)return(
    <button onClick={()=>setOpen(true)} style={{width:'100%',padding:'8px 0',border:'2px dashed #e2e8f0',background:'none',borderRadius:10,color:'#9ca3af',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
      <IcoPlus/>  {label}
    </button>
  );
  return(
    <div style={{padding:12,background:'#eff6ff',borderRadius:12,border:'1px solid #bfdbfe',marginBottom:6}}>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(fields.length,2)},1fr)`,gap:6}}>
        {fields.map(f=><div key={f.key}>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>{f.label}</div>
          {f.type==='select'
            ?<select value={v[f.key]} onChange={e=>set(f.key,e.target.value)} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'6px 8px',fontSize:13,background:'white'}}>
               {f.opts.map(o=><option key={o} value={o}>{f.optLabels?f.optLabels[o]:o}</option>)}
             </select>
            :<input type={f.type||'text'} placeholder={f.ph||''} value={v[f.key]} onChange={e=>set(f.key,f.type==='number'?parseFloat(e.target.value)||0:e.target.value)} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'6px 8px',fontSize:13}}/>
          }
        </div>)}
      </div>
      <div style={{display:'flex',gap:6,marginTop:8}}>
        <button onClick={doAdd} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'#3b82f6',color:'white',border:'none',borderRadius:8,fontSize:12,fontWeight:600}}><IcoPlus/>추가</button>
        <button onClick={()=>setOpen(false)} style={{padding:'5px 10px',background:'#e5e7eb',border:'none',borderRadius:8,fontSize:12}}>취소</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   7. AUTH SCREEN
══════════════════════════════════════════ */
function AuthScreen({onLogin}){
  const [tab,setTab]=useState('login');
  const [un,setUn]=useState('');
  const [pw,setPw]=useState('');
  const [showPw,setShowPw]=useState(false);
  const [err,setErr]=useState('');
  const users=Auth.users();

  const submit=()=>{
    setErr('');
    const r=tab==='login'?Auth.login(un,pw):Auth.register(un,pw);
    if(!r.ok){setErr(r.msg);return;}
    Auth.save(r.user); onLogin(r.user);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#0A0907 0%,#18140F 60%,#1A1612 100%)',padding:'20px'}}>
      <div style={{width:'100%',maxWidth:380}}>
        {/* Brand */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:8}}>🏦</div>
          <div style={{color:'#c9a84c',fontSize:22,fontWeight:900,letterSpacing:2,marginBottom:2}}>HILLIARD BUFFSHIRE</div>
          <div style={{color:'#C9A96E',fontSize:9,letterSpacing:3,fontWeight:800,marginBottom:4,opacity:.7}}>PERSONAL FINANCE DASHBOARD</div>
          <div style={{color:'#7A6A55',fontSize:11,letterSpacing:1}}>힐리아드 버프셔 재무 관리 스테이션</div>
        </div>
        <div style={{background:'#1E1B15',border:'1px solid #2E2820',borderRadius:20,padding:28,boxShadow:'0 25px 60px rgba(0,0,0,0.7)'}}>
          {/* Tabs */}
          <div style={{display:'flex',background:'#17140F',borderRadius:10,padding:3,marginBottom:20}}>
            {[['login','🔑 로그인'],['register','✨ 새 계정']].map(([k,l])=>(
              <button key={k} onClick={()=>{setTab(k);setErr('');}}
                style={{flex:1,padding:'8px 0',borderRadius:8,border:'none',fontSize:13,fontWeight:700,
                  background:tab===k?'#2E2820':'transparent',color:tab===k?'#C9A96E':'#7A6A55',
                  boxShadow:tab===k?'0 1px 4px rgba(0,0,0,0.4)':'none',transition:'all .2s'}}>
                {l}
              </button>
            ))}
          </div>
          {/* ID field */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:'#374151',display:'block',marginBottom:5,letterSpacing:1}}>아이디</label>
            {tab==='login'&&users.length>0
              ?<select value={un} onChange={e=>{setUn(e.target.value);setErr('');}} style={{width:'100%',padding:'10px 12px',border:'2px solid #e5e7eb',borderRadius:10,fontSize:14,background:'white'}}>
                 <option value="">— 선택 —</option>
                 {users.map(u=><option key={u} value={u}>{u.charAt(0).toUpperCase()+u.slice(1)}</option>)}
               </select>
              :<input type="text" placeholder="영문+숫자 (2자 이상)" value={un} onChange={e=>{setUn(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()} style={{width:'100%',padding:'10px 12px',border:'2px solid #e5e7eb',borderRadius:10,fontSize:14}}/>
            }
          </div>
          {/* PW field */}
          <div style={{marginBottom:16,position:'relative'}}>
            <label style={{fontSize:11,fontWeight:700,color:'#374151',display:'block',marginBottom:5,letterSpacing:1}}>비밀번호</label>
            <input type={showPw?'text':'password'} placeholder={tab==='register'?'4자 이상':'비밀번호'} value={pw}
              onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()}
              style={{width:'100%',padding:'10px 44px 10px 12px',border:'2px solid #e5e7eb',borderRadius:10,fontSize:14}}/>
            <button onClick={()=>setShowPw(p=>!p)} style={{position:'absolute',right:10,bottom:8,background:'none',border:'none',color:'#9ca3af',fontSize:11,padding:'2px 4px'}}>{showPw?'숨김':'보기'}</button>
          </div>
          {err&&<div style={{marginBottom:12,padding:'8px 12px',background:'#fee2e2',borderRadius:8,fontSize:13,color:'#dc2626',fontWeight:600}}>⚠️ {err}</div>}
          <button onClick={submit} style={{width:'100%',padding:'12px 0',background:'linear-gradient(135deg,#18140F,#C9A96E)',color:'white',border:'none',borderRadius:12,fontSize:15,fontWeight:800,letterSpacing:1,boxShadow:'0 4px 15px rgba(201,169,110,0.35)'}}>
            {tab==='login'?'로그인 →':'계정 만들기 →'}
          </button>
          {tab==='register'&&<p style={{textAlign:'center',fontSize:11,color:'#9ca3af',marginTop:12}}>✅ 데이터는 이 브라우저에 안전하게 저장됩니다</p>}
          {tab==='login'&&users.length===0&&<p style={{textAlign:'center',fontSize:11,color:'#9ca3af',marginTop:12}}>아직 계정이 없습니다. '새 계정'에서 가입하세요.</p>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   8. OVERVIEW TAB
══════════════════════════════════════════ */
function OverviewTab({incomes,setInc,expenses,setExp,debts,setDbt,totalInc,totalExp,totalDPay,netFlow,transactions}){
  const [ap,setAp]=useState('income');
  const upd=s=>(id,v)=>s(p=>p.map(x=>x.id===id?{...x,...v}:x));
  const del=s=>(id)=>s(p=>p.filter(x=>x.id!==id));
  const add=s=>item=>s(p=>[...p,item]);

  const FI=[{key:'name',label:'수입명',ph:'예: 월급'},{key:'amount',label:'월 금액 ($)',type:'number',def:0},{key:'type',label:'유형',type:'select',opts:['monthly','annual'],optLabels:{monthly:'매월',annual:'연1회'},def:'monthly'}];
  const FE=[{key:'name',label:'지출명',ph:'예: 렌트'},{key:'amount',label:'월 금액 ($)',type:'number',def:0},{key:'category',label:'카테고리',type:'select',opts:CAT_LIST,def:'기타'}];
  const FD=[{key:'name',label:'부채명',ph:'예: 학자금'},{key:'totalAmount',label:'잔여 부채 ($)',type:'number',def:0},{key:'monthlyPayment',label:'월 납부 ($)',type:'number',def:0},{key:'interestRate',label:'연이율 (%)',type:'number',def:0}];

  // 카테고리별 지출 파이차트 데이터
  const expByCat=useMemo(()=>{
    const m={};
    expenses.forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});
    return Object.entries(m).map(([name,value],i)=>({name,value,fill:CAT_COLORS[name]||PIE_PAL[i%PIE_PAL.length]}));
  },[expenses]);

  // 이번 달 실거래 카테고리 파이 (트랜잭션 있으면 사용)
  const curMth=monthKey();
  const mthExp=useMemo(()=>{
    const m={};
    transactions.filter(t=>t.date.startsWith(curMth)&&t.type==='expense')
      .forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});
    return Object.entries(m).map(([name,value],i)=>({name,value,fill:CAT_COLORS[name]||PIE_PAL[i%PIE_PAL.length]}));
  },[transactions,curMth]);

  const pieData=mthExp.length>0?mthExp:expByCat;
  const pieTitle=mthExp.length>0?'이번 달 실지출 분석':'월 고정지출 구성';

  const expR=totalInc>0?Math.min(100,(totalExp/totalInc)*100):0;
  const dbtR=totalInc>0?Math.min(100,(totalDPay/totalInc)*100):0;
  const savR=totalInc>0?Math.max(0,(netFlow/totalInc)*100):0;

  return(
    <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:16}} className="desktop-grid">
      {/* 왼쪽 패널 */}
      <div>
        <div style={{display:'flex',background:'white',borderRadius:12,border:'1px solid #e2e8f0',marginBottom:10,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
          {[['income','💚 수입'],['expense','❤️ 지출'],['debt','💜 부채']].map(([k,l])=>(
            <button key={k} onClick={()=>setAp(k)} style={{flex:1,padding:'10px 0',border:'none',fontSize:12,fontWeight:700,background:ap===k?'#4f46e5':'transparent',color:ap===k?'white':'#6b7280',transition:'all .2s'}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{background:'white',borderRadius:14,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',marginBottom:10}}>
          {ap==='income'&&<>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontWeight:700,fontSize:13,color:'#1f2937'}}>수입 항목</span>
              <span style={{color:'#22c55e',fontWeight:800,fontSize:13}}>{$$(totalInc)}/월</span>
            </div>
            {incomes.map(i=><EditRow key={i.id} item={i} fields={FI} onSave={upd(setInc)} onDelete={del(setInc)} bg="bg-green-50"/>)}
            <AddForm fields={FI} onAdd={add(setInc)} label="수입 추가"/>
          </>}
          {ap==='expense'&&<>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontWeight:700,fontSize:13,color:'#1f2937'}}>고정 지출</span>
              <span style={{color:'#ef4444',fontWeight:800,fontSize:13}}>{$$(totalExp)}/월</span>
            </div>
            {expenses.map(e=><EditRow key={e.id} item={e} fields={FE} onSave={upd(setExp)} onDelete={del(setExp)} bg="bg-red-50"/>)}
            <AddForm fields={FE} onAdd={add(setExp)} label="지출 추가"/>
          </>}
          {ap==='debt'&&<>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontWeight:700,fontSize:13,color:'#1f2937'}}>부채</span>
              <span style={{color:'#8b5cf6',fontWeight:800,fontSize:13}}>월 {$$(totalDPay)}</span>
            </div>
            {debts.map(d=><EditRow key={d.id} item={d} fields={FD} onSave={upd(setDbt)} onDelete={del(setDbt)} bg="bg-purple-50"/>)}
            <AddForm fields={FD} onAdd={add(setDbt)} label="부채 추가"/>
          </>}
        </div>
        {/* 비율 바 */}
        <div style={{background:'white',borderRadius:14,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:10}}>📊 수입 배분 비율</div>
          {[{l:'고정 지출',r:expR,c:'#f87171',v:totalExp},{l:'부채 납부',r:dbtR,c:'#a78bfa',v:totalDPay},{l:'저축 가능',r:Math.min(savR,100),c:'#34d399',v:Math.max(0,netFlow)}].map((row,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
              <div style={{width:56,fontSize:11,color:'#6b7280',flexShrink:0}}>{row.l}</div>
              <div style={{flex:1,background:'#f5f3ff',borderRadius:20,height:10,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min(100,row.r)}%`,background:row.c,borderRadius:20,transition:'width .4s'}}/>
              </div>
              <div style={{width:100,fontSize:11,textAlign:'right',color:'#374151',flexShrink:0}}>{$$(row.v)} <span style={{color:'#9ca3af'}}>({row.r.toFixed(0)}%)</span></div>
            </div>
          ))}
          {netFlow<0&&<div style={{marginTop:8,padding:'8px 10px',background:'#fee2e2',borderRadius:8,fontSize:12,color:'#dc2626',fontWeight:600}}>⚠️ 지출이 수입보다 {$$(-netFlow)} 많습니다!</div>}
        </div>
      </div>

      {/* 오른쪽 차트 */}
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {/* 지출 카테고리 파이 */}
        <div style={{background:'white',borderRadius:14,padding:16,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:4}}>🥧 {pieTitle}</div>
          {mthExp.length>0&&<div style={{fontSize:11,color:'#9ca3af',marginBottom:8}}>가계부에 기록된 실제 거래 기준</div>}
          {pieData.length>0
            ?<ResponsiveContainer width="100%" height={220}>
               <PieChart><Pie data={pieData} cx="50%" cy="50%" outerRadius={80} innerRadius={40} dataKey="value" nameKey="name" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false}>
                 {pieData.map((e,i)=><Cell key={i} fill={e.fill}/>)}
               </Pie><Tooltip content={<PieTip/>}/></PieChart>
             </ResponsiveContainer>
            :<div style={{height:100,display:'flex',alignItems:'center',justifyContent:'center',color:'#9ca3af',fontSize:13}}>지출 항목을 추가하면 차트가 표시됩니다</div>
          }
        </div>
        {/* 재무 건강도 */}
        <div style={{background:'white',borderRadius:14,padding:16,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:12}}>💡 재무 건강 지표</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}} className="stats-3">
            {[
              {l:'저축률',v:savR.toFixed(1)+'%',c:savR>=20?'#22c55e':savR>=10?'#f59e0b':'#ef4444',note:savR>=20?'✅ 우수':savR>=10?'⚡ 보통':'⚠️ 낮음'},
              {l:'부채비율',v:totalInc>0?((totalDPay/totalInc)*100).toFixed(1)+'%':'N/A',c:(totalDPay/totalInc)<=0.2?'#22c55e':'#ef4444',note:(totalDPay/totalInc)<=0.2?'✅ 적정':'⚠️ 위험'},
              {l:'월 순현금',v:$$(netFlow),c:netFlow>=0?'#3b82f6':'#ef4444',note:netFlow>=0?'저축가능':'지출초과'},
            ].map((k,i)=>(
              <div key={i} style={{background:'#f8fafc',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
                <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>{k.l}</div>
                <div style={{fontSize:16,fontWeight:800,color:k.c}}>{k.v}</div>
                <div style={{fontSize:10,color:'#9ca3af',marginTop:2}}>{k.note}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   9. LEDGER TAB (가계부)
══════════════════════════════════════════ */
function LedgerTab({transactions,setTx}){
  const [mth,setMth]=useState(monthKey());
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),name:'',amount:'',type:'expense',category:'식비',isOneTime:false});
  const [showForm,setShowForm]=useState(false);
  const [showChart,setShowChart]=useState(true);

  const filtered=useMemo(()=>transactions.filter(t=>t.date.startsWith(mth)).sort((a,b)=>b.date.localeCompare(a.date)),[transactions,mth]);
  const mthInc=filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mthExp=filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const mthNet=mthInc-mthExp;

  // 카테고리별 파이
  const catPie=useMemo(()=>{
    const m={};
    filtered.filter(t=>t.type==='expense').forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});
    return Object.entries(m).map(([name,value],i)=>({name,value,fill:CAT_COLORS[name]||PIE_PAL[i%PIE_PAL.length]}));
  },[filtered]);

  // 6개월 비교 바차트
  const barData=useMemo(()=>{
    const months=[];
    let cur=mth;
    for(let i=0;i<6;i++){months.unshift(cur);cur=prevMonth(cur);}
    return months.map(m=>{
      const txns=transactions.filter(t=>t.date.startsWith(m));
      return{month:monthLabel(m).slice(0,6),income:txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),expense:txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};
    });
  },[transactions,mth]);

  const addTx=()=>{
    if(!form.name||!form.amount)return;
    setTx(p=>[...p,{...form,amount:parseFloat(form.amount)||0,id:gid()}]);
    setForm(f=>({...f,name:'',amount:'',isOneTime:false}));
    setShowForm(false);
  };

  const delTx=(id)=>setTx(p=>p.filter(t=>t.id!==id));

  // 날짜별 그룹핑
  const grouped=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{(m[t.date]=m[t.date]||[]).push(t);});
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  },[filtered]);

  return(
    <div>
      {/* 월 네비게이션 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:14,background:'white',borderRadius:14,padding:'12px 20px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <button onClick={()=>setMth(prevMonth(mth))} style={{background:'none',border:'none',color:'#374151',display:'flex',padding:4}}><IcoLeft/></button>
        <span style={{fontWeight:800,fontSize:16,color:'#1f2937',minWidth:100,textAlign:'center'}}>{monthLabel(mth)}</span>
        <button onClick={()=>setMth(nextMonth(mth))} style={{background:'none',border:'none',color:'#374151',display:'flex',padding:4}}><IcoRight/></button>
      </div>

      {/* 이달 요약 카드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}} className="stats-3">
        {[
          {l:'이달 수입',v:mthInc,c:'#22c55e',bg:'#f0fdf4'},
          {l:'이달 지출',v:mthExp,c:'#ef4444',bg:'#fff1f2'},
          {l:'이달 순수익',v:mthNet,c:mthNet>=0?'#3b82f6':'#f97316',bg:mthNet>=0?'#eff6ff':'#fff7ed'},
        ].map((k,i)=>(
          <div key={i} style={{background:k.bg,borderRadius:12,padding:'12px 14px',textAlign:'center'}}>
            <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:800,color:k.c}}>{k.v>=0?'':'-'}{$$(Math.abs(k.v))}</div>
          </div>
        ))}
      </div>

      {/* 거래 추가 버튼 / 폼 */}
      {!showForm
        ?<button onClick={()=>setShowForm(true)} style={{width:'100%',marginBottom:12,padding:'11px 0',background:'linear-gradient(135deg,#667eea,#c9a84c)',color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
           <IcoPlus s={14}/> 거래 추가
         </button>
        :<div style={{background:'white',borderRadius:14,padding:14,marginBottom:12,boxShadow:'0 2px 8px rgba(0,0,0,0.08)'}}>
           <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:'#1f2937'}}>📝 새 거래 입력</div>
           <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:8}}>
             {/* 유형 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>유형</div>
               <div style={{display:'flex',gap:4}}>
                 {['expense','income'].map(t=>(
                   <button key={t} onClick={()=>setForm(f=>({...f,type:t}))}
                     style={{flex:1,padding:'7px 0',borderRadius:8,border:'none',fontSize:12,fontWeight:700,
                       background:form.type===t?(t==='income'?'#dcfce7':'#fee2e2'):'#f1f5f9',
                       color:form.type===t?(t==='income'?'#15803d':'#dc2626'):'#6b7280'}}>
                     {t==='income'?'💰 수입':'💸 지출'}
                   </button>
                 ))}
               </div>
             </div>
             {/* 날짜 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>날짜</div>
               <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13}}/>
             </div>
             {/* 내용 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>내용</div>
               <input type="text" placeholder="예: 스타벅스, 꽁돈" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13}}/>
             </div>
             {/* 금액 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>금액 ($)</div>
               <input type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13}}/>
             </div>
             {/* 카테고리 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>카테고리</div>
               <select value={form.category} onChange={e=>{const cat=e.target.value;setForm(f=>({...f,category:cat,isOneTime:cat==='식비'?true:f.isOneTime}));}} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13,background:'white'}}>
                 {(form.type==='income'?['수입','기타']:CAT_LIST).map(c=><option key={c} value={c}>{c}</option>)}
               </select>
             </div>
             {/* 1회성 */}
             <div style={{display:'flex',alignItems:'center',gap:6,paddingTop:18}}>
               <input type="checkbox" id="oneTime" checked={form.isOneTime} onChange={e=>setForm(f=>({...f,isOneTime:e.target.checked}))} style={{width:16,height:16,accentColor:'#c9a84c'}}/>
               <label htmlFor="oneTime" style={{fontSize:12,color:'#374151',fontWeight:600}}>🎁 1회성</label>
             </div>
           </div>
           <div style={{display:'flex',gap:6}}>
             <button onClick={addTx} style={{flex:1,padding:'9px 0',background:'#1e1b4b',color:'white',border:'none',borderRadius:10,fontWeight:700,fontSize:13}}>추가</button>
             <button onClick={()=>setShowForm(false)} style={{padding:'9px 14px',background:'#e5e7eb',border:'none',borderRadius:10,fontSize:13}}>취소</button>
           </div>
         </div>
      }

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}} className="desktop-grid">
        {/* 거래 목록 */}
        <div style={{background:'white',borderRadius:14,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:10}}>📋 거래 내역 ({filtered.length}건)</div>
          {grouped.length===0
            ?<div style={{textAlign:'center',padding:'24px 0',color:'#9ca3af',fontSize:13}}>이달 거래 내역이 없습니다<br/>위 버튼으로 추가하세요</div>
            :<div style={{maxHeight:380,overflowY:'auto'}}>
               {grouped.map(([date,txns])=>(
                 <div key={date} style={{marginBottom:12}}>
                   <div style={{fontSize:11,fontWeight:700,color:'#6b7280',marginBottom:4,paddingLeft:2}}>{date}</div>
                   {txns.map(t=>(
                     <div key={t.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',borderRadius:10,background:t.type==='income'?'#f0fdf4':'#fef2f2',marginBottom:4}}>
                       <div>
                         <span style={{fontSize:13,fontWeight:600,color:'#1f2937'}}>{t.name}</span>
                         <span style={{marginLeft:6,fontSize:11,background:'rgba(255,255,255,0.7)',padding:'1px 6px',borderRadius:20,color:'#6b7280'}}>{t.category}</span>
                         {t.isOneTime&&<span style={{marginLeft:4,fontSize:10,background:'#fef3c7',padding:'1px 5px',borderRadius:20,color:'#92400e'}}>1회</span>}
                       </div>
                       <div style={{display:'flex',alignItems:'center',gap:6}}>
                         <span style={{fontSize:13,fontWeight:800,color:t.type==='income'?'#15803d':'#dc2626'}}>{t.type==='income'?'+':'-'}{$$(t.amount)}</span>
                         <button onClick={()=>delTx(t.id)} style={{background:'none',border:'none',color:'#fca5a5',padding:2,display:'flex'}}><IcoTrash s={12}/></button>
                       </div>
                     </div>
                   ))}
                 </div>
               ))}
             </div>
          }
        </div>

/* ══════════════════════════════════════════
   12. DASHBOARD (state + layout)
══════════════════════════════════════════ */
function Dashboard({user,onLogout,theme,themeIdx,setThemeIdx}){
  const K=k=>`hb_${user}_${k}`;
  const [tab,setTab]=useState('overview');
  const [currentBalance,setCB]=useState(()=>LS.get(K('balance'),5000));
  const [savingsGoal,setSG]=useState(()=>LS.get(K('goal'),50000));
  const [projMonths,setPM]=useState(()=>LS.get(K('months'),60));
  const [incomes,setInc]=useState(()=>LS.get(K('incomes'),DEF_INC));
  const [expenses,setExp]=useState(()=>LS.get(K('expenses'),DEF_EXP));
  const [debts,setDbt]=useState(()=>LS.get(K('debts'),DEF_DBT));
  const [investments,setInv]=useState(()=>LS.get(K('investments'),DEF_INV));
  const [transactions,setTx]=useState(()=>LS.get(K('transactions'),DEF_TXN));

  useEffect(()=>LS.set(K('balance'),currentBalance),[currentBalance]);
  useEffect(()=>LS.set(K('goal'),savingsGoal),[savingsGoal]);
  useEffect(()=>LS.set(K('months'),projMonths),[projMonths]);
  useEffect(()=>LS.set(K('incomes'),incomes),[incomes]);
  useEffect(()=>LS.set(K('expenses'),expenses),[expenses]);
  useEffect(()=>LS.set(K('debts'),debts),[debts]);
  useEffect(()=>LS.set(K('investments'),investments),[investments]);
  useEffect(()=>LS.set(K('transactions'),transactions),[transactions]);

  const totalInc=useMemo(()=>incomes.reduce((s,i)=>s+(i.type==='annual'?i.amount/12:i.amount),0),[incomes]);
  const totalExp=useMemo(()=>expenses.reduce((s,e)=>s+e.amount,0),[expenses]);
  const totalDPay=useMemo(()=>debts.reduce((s,d)=>s+d.monthlyPayment,0),[debts]);
  const totalDAmt=useMemo(()=>debts.reduce((s,d)=>s+d.totalAmount,0),[debts]);
  const totalInvBal=useMemo(()=>investments.reduce((s,i)=>s+i.balance,0),[investments]);
  const totalAssets=currentBalance+totalInvBal;
  const netWorth=totalAssets-totalDAmt;
  const netFlow=totalInc-totalExp-totalDPay;

  // 미래 예측 (현금 + 투자 + 이자)
  const projData=useMemo(()=>{
    let bal=currentBalance;
    let ds=debts.map(d=>({...d,rem:d.totalAmount}));
    let ivs=investments.map(i=>({...i,bal:i.balance}));
    const rows=[];
    for(let m=0;m<=projMonths;m++){
      const dTotal=ds.reduce((s,d)=>s+Math.max(0,d.rem),0);
      const iTotal=ivs.reduce((s,i)=>s+i.bal,0);
      rows.push({m,label:m===0?'현재':m%12===0?`${m/12}년`:`${m}개월`,
        balance:Math.round(bal),debt:Math.round(dTotal),investments:Math.round(iTotal),
        netWorth:Math.round(bal+iTotal-dTotal)});
      if(m<projMonths){
        let paid=0;
        ds=ds.map(d=>{
          if(d.rem<=0)return d;
          const interest=d.rem*(d.interestRate/100/12);
          const payment=Math.min(d.monthlyPayment,d.rem+interest);
          paid+=payment;
          return{...d,rem:Math.max(0,d.rem+interest-payment)};
        });
        ivs=ivs.map(i=>({...i,bal:i.bal*(1+i.expectedReturn/100/12)+i.monthlyContribution}));
        bal+=totalInc-totalExp-paid;
      }
    }
    return rows;
  },[currentBalance,debts,investments,projMonths,totalInc,totalExp]);

  const milestones=useMemo(()=>{
    const r=[];
    const g=projData.find(d=>d.netWorth>=savingsGoal);
    if(g) r.push({icon:'🎯',label:`순자산 목표 달성 (${$$(savingsGoal)})`,month:g.m});
    const df=projData.find(d=>d.debt<=0&&d.m>0);
    if(df) r.push({icon:'🔓',label:'부채 완전 상환',month:df.m});
    const pn=projData.find(d=>d.netWorth>=0&&d.m>0);
    if(pn&&netWorth<0) r.push({icon:'📈',label:'순자산 플러스 전환',month:pn.m});
    return r;
  },[projData,savingsGoal,netWorth]);

  const logout=()=>{ Auth.clear(); onLogout(); };
  const reset=()=>{ if(!confirm(`${user}의 모든 데이터를 초기화할까요?`))return; setCB(5000);setSG(50000);setPM(60);setInc(DEF_INC);setExp(DEF_EXP);setDbt(DEF_DBT);setInv(DEF_INV);setTx(DEF_TXN); };

  const TABS=[
    {k:'overview',icon:'🏠',label:'대시보드'},
    {k:'ledger',icon:'📒',label:'가계부'},
    {k:'investments',icon:'📈',label:'투자'},
    {k:'projection',icon:'🔮',label:'예측'},
  ];

  // 상단 카드 데이터
  const cards=[
    {l:'월 수입',v:$$(totalInc),sub:`${incomes.length}개 수입원`,c:'#22c55e',border:'#bbf7d0'},
    {l:'월 지출 합계',v:$$(totalExp+totalDPay),sub:`고정 ${$$(totalExp)} + 부채 ${$$(totalDPay)}`,c:'#ef4444',border:'#fecaca'},
    {l:'월 순 현금흐름',v:(netFlow>=0?'+':'')+$$(netFlow),sub:netFlow>=0?'💚 저축 가능':'⚠️ 지출 초과',c:netFlow>=0?'#3b82f6':'#f97316',border:netFlow>=0?'#bfdbfe':'#fed7aa'},
    {l:'투자 잔고',v:$$(totalInvBal),sub:`${investments.length}개 계좌`,c:'#8b5cf6',border:'#ddd6fe'},
    {l:'총 자산',v:$$(totalAssets),sub:`현금 ${$$(currentBalance)} + 투자 ${$$(totalInvBal)}`,c:'#4f46e5',border:'#ddd6fe'},
    {l:'순자산 (Net Worth)',v:$$(netWorth),sub:`총자산 - 부채 ${$$(totalDAmt)}`,c:netWorth>=0?'#c9a84c':'#ef4444',border:netWorth>=0?'#fef3c7':'#fecaca'},
  ];

  return(
    <div style={{minHeight:'100vh',background:theme.bg}}>
      {/* 헤더 */}
      <div style={{background:theme.header,padding:'14px 20px'}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{color:theme.accent,fontSize:20,fontWeight:900,letterSpacing:2,lineHeight:1}}>HILLIARD BUFFSHIRE</div>
            <div style={{color:theme.accent,fontSize:10,letterSpacing:4,marginTop:4,fontWeight:800,opacity:.7}}>PERSONAL FINANCE DASHBOARD</div>
            <div style={{color:theme.txMuted,fontSize:11,letterSpacing:1,fontWeight:500,marginTop:3}}>힐리아드 버프셔 재무 관리 스테이션</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {/* 테마 선택 */}
            <div style={{display:'flex',gap:5,alignItems:'center',marginRight:4}}>
              {THEMES.map((t,i)=>(
                <button key={i} onClick={()=>setThemeIdx(i)} title={t.name}
                  style={{width:20,height:20,borderRadius:'50%',cursor:'pointer',padding:0,
                    background:i===0?'linear-gradient(135deg,#667eea,#764ba2)':i===1?'linear-gradient(135deg,#FAF8F4,#C9A96E)':'linear-gradient(135deg,#0E0C09,#C9A96E)',
                    border:themeIdx===i?`2px solid ${t.accent}`:'2px solid rgba(255,255,255,0.25)',
                    transition:'border .15s,transform .15s',transform:themeIdx===i?'scale(1.25)':'scale(1)'}}>
                </button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',background:theme.badgeBg,border:`1px solid ${theme.badgeBr}`,borderRadius:20,color:theme.accent,fontSize:13,fontWeight:700}}>
              <IcoUser s={13}/>{user.charAt(0).toUpperCase()+user.slice(1)}
            </div>
            <button onClick={reset} style={{padding:'6px 10px',background:'rgba(255,255,255,0.05)',border:`1px solid ${theme.border}`,borderRadius:20,color:theme.txMuted,fontSize:11,fontWeight:600}}>초기화</button>
            <button onClick={logout} style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',background:'rgba(255,255,255,0.05)',border:`1px solid ${theme.border}`,borderRadius:20,color:theme.txMuted,fontSize:12,fontWeight:600}}>
              <IcoOut s={13}/>로그아웃
            </button>
          </div>
        </div>
      </div>

      {/* 순자산 하이라이트 바 */}
      <div style={{background:theme.netBar,padding:'10px 20px',borderBottom:`1px solid ${theme.border}`}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{color:theme.txMuted,fontSize:12}}>순자산 (Net Worth)</span>
          <span style={{color:netWorth>=0?theme.accent:'#f87171',fontSize:22,fontWeight:900,letterSpacing:1}}>{$$(netWorth)}</span>
          <span style={{color:theme.txMuted,fontSize:11}}>= {$$(totalAssets)} − {$$(totalDAmt)}</span>
        </div>
      </div>

      {/* 탭 네비게이션 */}
      <div style={{background:theme.tabBg,borderBottom:`1px solid ${theme.border}`,position:'sticky',top:0,zIndex:10}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex'}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{flex:1,padding:'12px 8px',border:'none',background:'none',fontSize:12,fontWeight:700,
                color:tab===t.k?theme.tabActive:theme.txMuted,borderBottom:tab===t.k?`3px solid ${theme.accent}`:'3px solid transparent',
                transition:'all .2s',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
              <span>{t.icon}</span><span className="tab-label-long">{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* 메인 콘텐츠 */}
      <div style={{maxWidth:1120,margin:'0 auto',padding:'16px'}}>
        {/* 요약 카드 6개 */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}} className="cards-grid">
          {cards.map((c,i)=>(
            <div key={i} style={{background:theme.cardBg,borderRadius:12,padding:'12px 14px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',borderLeft:`4px solid ${c.border}`}}>
              <div style={{fontSize:10,color:theme.txMuted,fontWeight:700,letterSpacing:1,marginBottom:3}}>{c.l.toUpperCase()}</div>
              <div style={{fontSize:18,fontWeight:900,color:c.c,lineHeight:1.1}}>{c.v}</div>
              <div style={{fontSize:10,color:theme.txMuted,marginTop:3}}>{c.sub}</div>
            </div>
          ))}
        </div>

        {/* 탭 콘텐츠 */}
        {tab==='overview'&&<OverviewTab incomes={incomes} setInc={setInc} expenses={expenses} setExp={setExp} debts={debts} setDbt={setDbt} totalInc={totalInc} totalExp={totalExp} totalDPay={totalDPay} netFlow={netFlow} transactions={transactions}/>}
        {tab==='ledger'&&<LedgerTab transactions={transactions} setTx={setTx}/>}
        {tab==='investments'&&<InvestmentTab investments={investments} setInv={setInv}/>}
        {tab==='projection'&&<ProjectionTab currentBalance={currentBalance} setCB={setCB} savingsGoal={savingsGoal} setSG={setSG} projMonths={projMonths} setPM={setPM} projData={projData.filter((_,i)=>i%Math.max(1,Math.floor(projMonths/20))===0)} milestones={milestones} totalInc={totalInc} totalExp={totalExp} totalDPay={totalDPay}/>}

        <div style={{textAlign:'center',fontSize:10,color:theme.txMuted,marginTop:20,paddingBottom:20}}>
          Hilliard Buffshire Personal Finance Dashboard · 데이터는 브라우저에 저장됩니다
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   13. APP ROOT
══════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(()=>Auth.session());
  const [themeIdx,setThemeIdx]=useState(()=>parseInt(LS.get('hb_theme','0'))||0);
  const login=(u)=>setUser(u);
  const logout=()=>setUser(null);
  const setTh=(i)=>{setThemeIdx(i);LS.set('hb_theme',String(i));};
  if(!user)return <AuthScreen onLogin={login}/>;
  return <Dashboard user={user} onLogout={logout} theme={THEMES[themeIdx]} themeIdx={themeIdx} setThemeIdx={setTh}/>;
}

document.getElementById('loading').style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
