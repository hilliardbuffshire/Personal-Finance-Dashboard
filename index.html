function EditRow({item,fields,onSave,onDelete,bg='bg-gray-50'}){

  const set=(k,val)=>setV(p=>({...p,[k]:val}));

    <div className="mb-2 p-3 rounded-xl border border-yellow-300 bg-yellow-50">

          <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>{f.label}</div>

function AddForm({fields,onAdd,label}){
  const init=Object.fromEntries(fields.map(f=>[f.key,f.def!==undefined?f.def:f.type==='number'?0:'']));
  const [v,setV]=useState({...init});
  const [open,setOpen]=useState(false);
  const set=(k,val)=>setV(p=>({...p,[k]:val}));
  const doAdd=()=>{if(!v[fields[0].key])return;onAdd({...v,id:gid()});setV({...init});setOpen(false);};
  if(!open)return(
    <button onClick={()=>setOpen(true)} style={{width:'100%',padding:'8px 0',border:'2px dashed #e2e8f0',background:'none',borderRadius:10,color:'#9ca3af',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
      <IcoPlus/>  {label}
    </button>
  );
  return(
    <div style={{padding:12,background:'#eff6ff',borderRadius:12,border:'1px solid #bfdbfe',marginBottom:6}}>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(fields.length,2)},1fr)`,gap:6}}>
        {fields.map(f=><div key={f.key}>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>{f.label}</div>
          {f.type==='select'
            ?<select value={v[f.key]} onChange={e=>set(f.key,e.target.value)} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'6px 8px',fontSize:13,background:'white'}}>
               {f.opts.map(o=><option key={o} value={o}>{f.optLabels?f.optLabels[o]:o}</option>)}
             </select>
            :<input type={f.type||'text'} placeholder={f.ph||''} value={v[f.key]} onChange={e=>set(f.key,f.type==='number'?parseFloat(e.target.value)||0:e.target.value)} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'6px 8px',fontSize:13}}/>
          }
        </div>)}
      </div>
      <div style={{display:'flex',gap:6,marginTop:8}}>
        <button onClick={doAdd} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 12px',background:'#3b82f6',color:'white',border:'none',borderRadius:8,fontSize:12,fontWeight:600}}><IcoPlus/>矛露聰锚掳聙</button>

      </div>
    </div>
  );
}

            <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
              <div style={{width:56,fontSize:11,color:'#6b7280',flexShrink:0}}>{row.l}</div>
              <div style={{flex:1,background:'#f5f3ff',borderRadius:20,height:10,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min(100,row.r)}%`,background:row.c,borderRadius:20,transition:'width .4s'}}/>
              </div>
              <div style={{width:100,fontSize:11,textAlign:'right',color:'#374151',flexShrink:0}}>{$$(row.v)} <span style={{color:'#9ca3af'}}>({row.r.toFixed(0)}%)</span></div>
            </div>
          ))}
          {netFlow<0&&<div style={{marginTop:8,padding:'8px 10px',background:'#fee2e2',borderRadius:8,fontSize:12,color:'#dc2626',fontWeight:600}}>芒職聽茂赂聫 矛搂聙矛露聹矛聺麓 矛聢聵矛聻聟毛鲁麓毛聥陇 {$$(-netFlow)} 毛搂聨矛聤碌毛聥聢毛聥陇!</div>}
        </div>
      </div>

      {/* 矛聵陇毛楼赂矛陋陆 矛掳篓铆聤赂 */}
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {/* 矛搂聙矛露聹 矛鹿麓铆聟聦锚鲁聽毛娄卢 铆聦聦矛聺麓 */}
        <div style={{background:'white',borderRadius:14,padding:16,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:4}}>冒聼楼搂 {pieTitle}</div>
          {mthExp.length>0&&<div style={{fontSize:11,color:'#9ca3af',marginBottom:8}}>锚掳聙锚鲁聞毛露聙矛聴聬 锚赂掳毛隆聺毛聬聹 矛聥陇矛聽聹 锚卤掳毛聻聵 锚赂掳矛陇聙</div>}
          {pieData.length>0
            ?<ResponsiveContainer width="100%" height={220}>
               <PieChart><Pie data={pieData} cx="50%" cy="50%" outerRadius={80} innerRadius={40} dataKey="value" nameKey="name" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false}>
                 {pieData.map((e,i)=><Cell key={i} fill={e.fill}/>)}
               </Pie><Tooltip content={<PieTip/>}/></PieChart>
             </ResponsiveContainer>
            :<div style={{height:100,display:'flex',alignItems:'center',justifyContent:'center',color:'#9ca3af',fontSize:13}}>矛搂聙矛露聹 铆聲颅毛陋漏矛聺聞 矛露聰锚掳聙铆聲聵毛漏麓 矛掳篓铆聤赂锚掳聙 铆聭聹矛聥聹毛聬漏毛聥聢毛聥陇</div>
          }
        </div>
        {/* 矛聻卢毛卢麓 锚卤麓锚掳聲毛聫聞 */}
        <div style={{background:'white',borderRadius:14,padding:16,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:12}}>冒聼聮隆 矛聻卢毛卢麓 锚卤麓锚掳聲 矛搂聙铆聭聹</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}} className="stats-3">
            {[
              {l:'矛聽聙矛露聲毛楼聽',v:savR.toFixed(1)+'%',c:savR>=20?'#22c55e':savR>=10?'#f59e0b':'#ef4444',note:savR>=20?'芒聹聟 矛職掳矛聢聵':savR>=10?'芒職隆 毛鲁麓铆聠碌':'芒職聽茂赂聫 毛聜庐矛聺聦'},
              {l:'毛露聙矛卤聞毛鹿聞矛聹篓',v:totalInc>0?((totalDPay/totalInc)*100).toFixed(1)+'%':'N/A',c:(totalDPay/totalInc)<=0.2?'#22c55e':'#ef4444',note:(totalDPay/totalInc)<=0.2?'芒聹聟 矛聽聛矛聽聲':'芒職聽茂赂聫 矛聹聞铆聴聵'},
              {l:'矛聸聰 矛聢聹铆聵聞锚赂聢',v:$$(netFlow),c:netFlow>=0?'#3b82f6':'#ef4444',note:netFlow>=0?'矛聽聙矛露聲锚掳聙毛聤楼':'矛搂聙矛露聹矛麓聢锚鲁录'},
            ].map((k,i)=>(
              <div key={i} style={{background:'#f8fafc',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
                <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>{k.l}</div>
                <div style={{fontSize:16,fontWeight:800,color:k.c}}>{k.v}</div>
                <div style={{fontSize:10,color:'#9ca3af',marginTop:2}}>{k.note}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
   9. LEDGER TAB (锚掳聙锚鲁聞毛露聙)
芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬 */
function LedgerTab({transactions,setTx}){
  const [mth,setMth]=useState(monthKey());
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),name:'',amount:'',type:'expense',category:'矛聥聺毛鹿聞',isOneTime:false});
  const [showForm,setShowForm]=useState(false);
  const [showChart,setShowChart]=useState(true);

  const filtered=useMemo(()=>transactions.filter(t=>t.date.startsWith(mth)).sort((a,b)=>b.date.localeCompare(a.date)),[transactions,mth]);
  const mthInc=filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mthExp=filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const mthNet=mthInc-mthExp;

  // 矛鹿麓铆聟聦锚鲁聽毛娄卢毛鲁聞 铆聦聦矛聺麓
  const catPie=useMemo(()=>{
    const m={};
    filtered.filter(t=>t.type==='expense').forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});
    return Object.entries(m).map(([name,value],i)=>({name,value,fill:CAT_COLORS[name]||PIE_PAL[i%PIE_PAL.length]}));
  },[filtered]);

  // 6锚掳聹矛聸聰 毛鹿聞锚碌聬 毛掳聰矛掳篓铆聤赂
  const barData=useMemo(()=>{
    const months=[];
    let cur=mth;
    for(let i=0;i<6;i++){months.unshift(cur);cur=prevMonth(cur);}
    return months.map(m=>{
      const txns=transactions.filter(t=>t.date.startsWith(m));
      return{month:monthLabel(m).slice(0,6),income:txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),expense:txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};
    });
  },[transactions,mth]);

  const addTx=()=>{
    if(!form.name||!form.amount)return;
    setTx(p=>[...p,{...form,amount:parseFloat(form.amount)||0,id:gid()}]);
    setForm(f=>({...f,name:'',amount:'',isOneTime:false}));
    setShowForm(false);
  };

  const delTx=(id)=>setTx(p=>p.filter(t=>t.id!==id));

  // 毛聜聽矛搂聹毛鲁聞 锚路赂毛拢鹿铆聲聭
  const grouped=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{(m[t.date]=m[t.date]||[]).push(t);});
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  },[filtered]);

  return(
    <div>
      {/* 矛聸聰 毛聞陇毛鹿聞锚虏聦矛聺麓矛聟聵 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:14,background:'white',borderRadius:14,padding:'12px 20px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
        <button onClick={()=>setMth(prevMonth(mth))} style={{background:'none',border:'none',color:'#374151',display:'flex',padding:4}}><IcoLeft/></button>
        <span style={{fontWeight:800,fontSize:16,color:'#1f2937',minWidth:100,textAlign:'center'}}>{monthLabel(mth)}</span>
        <button onClick={()=>setMth(nextMonth(mth))} style={{background:'none',border:'none',color:'#374151',display:'flex',padding:4}}><IcoRight/></button>
      </div>

      {/* 矛聺麓毛聥卢 矛職聰矛聲陆 矛鹿麓毛聯聹 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}} className="stats-3">
        {[
          {l:'矛聺麓毛聥卢 矛聢聵矛聻聟',v:mthInc,c:'#22c55e',bg:'#f0fdf4'},
          {l:'矛聺麓毛聥卢 矛搂聙矛露聹',v:mthExp,c:'#ef4444',bg:'#fff1f2'},
          {l:'矛聺麓毛聥卢 矛聢聹矛聢聵矛聺碌',v:mthNet,c:mthNet>=0?'#3b82f6':'#f97316',bg:mthNet>=0?'#eff6ff':'#fff7ed'},
        ].map((k,i)=>(
          <div key={i} style={{background:k.bg,borderRadius:12,padding:'12px 14px',textAlign:'center'}}>
            <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:800,color:k.c}}>{k.v>=0?'':'-'}{$$(Math.abs(k.v))}</div>
          </div>
        ))}
      </div>

      {/* 锚卤掳毛聻聵 矛露聰锚掳聙 毛虏聞铆聤录 / 铆聫录 */}
      {!showForm
        ?<button onClick={()=>setShowForm(true)} style={{width:'100%',marginBottom:12,padding:'11px 0',background:'linear-gradient(135deg,#667eea,#c9a84c)',color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
           <IcoPlus s={14}/> 锚卤掳毛聻聵 矛露聰锚掳聙
         </button>
        :<div style={{background:'white',borderRadius:14,padding:14,marginBottom:12,boxShadow:'0 2px 8px rgba(0,0,0,0.08)'}}>
           <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:'#1f2937'}}>冒聼聯聺 矛聝聢 锚卤掳毛聻聵 矛聻聟毛聽楼</div>
           <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:8}}>
             {/* 矛聹聽铆聵聲 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>矛聹聽铆聵聲</div>
               <div style={{display:'flex',gap:4}}>
                 {['expense','income'].map(t=>(
                   <button key={t} onClick={()=>setForm(f=>({...f,type:t}))}
                     style={{flex:1,padding:'7px 0',borderRadius:8,border:'none',fontSize:12,fontWeight:700,
                       background:form.type===t?(t==='income'?'#dcfce7':'#fee2e2'):'#f1f5f9',
                       color:form.type===t?(t==='income'?'#15803d':'#dc2626'):'#6b7280'}}>
                     {t==='income'?'冒聼聮掳 矛聢聵矛聻聟':'冒聼聮赂 矛搂聙矛露聹'}
                   </button>
                 ))}
               </div>
             </div>
             {/* 毛聜聽矛搂聹 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>毛聜聽矛搂聹</div>
               <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13}}/>
             </div>
             {/* 毛聜麓矛職漏 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>毛聜麓矛職漏</div>
               <input type="text" placeholder="矛聵聢: 矛聤陇铆聝聙毛虏聟矛聤陇, 锚陆聛毛聫聢" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13}}/>
             </div>
             {/* 锚赂聢矛聲隆 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>锚赂聢矛聲隆 ($)</div>
               <input type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13}}/>
             </div>
             {/* 矛鹿麓铆聟聦锚鲁聽毛娄卢 */}
             <div>
               <div style={{fontSize:11,color:'#6b7280',marginBottom:3}}>矛鹿麓铆聟聦锚鲁聽毛娄卢</div>
               <select value={form.category} onChange={e=>{const cat=e.target.value;setForm(f=>({...f,category:cat,isOneTime:cat==='矛聥聺毛鹿聞'?true:f.isOneTime}));}} style={{width:'100%',border:'1px solid #d1d5db',borderRadius:8,padding:'7px 8px',fontSize:13,background:'white'}}>
                 {(form.type==='income'?['矛聢聵矛聻聟','锚赂掳铆聝聙']:CAT_LIST).map(c=><option key={c} value={c}>{c}</option>)}
               </select>
             </div>
             {/* 1铆職聦矛聞卤 */}
             <div style={{display:'flex',alignItems:'center',gap:6,paddingTop:18}}>
               <input type="checkbox" id="oneTime" checked={form.isOneTime} onChange={e=>setForm(f=>({...f,isOneTime:e.target.checked}))} style={{width:16,height:16,accentColor:'#c9a84c'}}/>
               <label htmlFor="oneTime" style={{fontSize:12,color:'#374151',fontWeight:600}}>冒聼聨聛 1铆職聦矛聞卤</label>
             </div>
           </div>
           <div style={{display:'flex',gap:6}}>
             <button onClick={addTx} style={{flex:1,padding:'9px 0',background:'#1e1b4b',color:'white',border:'none',borderRadius:10,fontWeight:700,fontSize:13}}>矛露聰锚掳聙</button>
             <button onClick={()=>setShowForm(false)} style={{padding:'9px 14px',background:'#e5e7eb',border:'none',borderRadius:10,fontSize:13}}>矛路篓矛聠聦</button>
           </div>
         </div>
      }

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}} className="desktop-grid">
        {/* 锚卤掳毛聻聵 毛陋漏毛隆聺 */}
        <div style={{background:'white',borderRadius:14,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:10}}>冒聼聯聥 锚卤掳毛聻聵 毛聜麓矛聴颅 ({filtered.length}锚卤麓)</div>
          {grouped.length===0
            ?<div style={{textAlign:'center',padding:'24px 0',color:'#9ca3af',fontSize:13}}>矛聺麓毛聥卢 锚卤掳毛聻聵 毛聜麓矛聴颅矛聺麓 矛聴聠矛聤碌毛聥聢毛聥陇<br/>矛聹聞 毛虏聞铆聤录矛聹录毛隆聹 矛露聰锚掳聙铆聲聵矛聞赂矛職聰</div>
            :<div style={{maxHeight:380,overflowY:'auto'}}>
               {grouped.map(([date,txns])=>(
                 <div key={date} style={{marginBottom:12}}>
                   <div style={{fontSize:11,fontWeight:700,color:'#6b7280',marginBottom:4,paddingLeft:2}}>{date}</div>
                   {txns.map(t=>(
                     <div key={t.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',borderRadius:10,background:t.type==='income'?'#f0fdf4':'#fef2f2',marginBottom:4}}>
                       <div>
                         <span style={{fontSize:13,fontWeight:600,color:'#1f2937'}}>{t.name}</span>
                         <span style={{marginLeft:6,fontSize:11,background:'rgba(255,255,255,0.7)',padding:'1px 6px',borderRadius:20,color:'#6b7280'}}>{t.category}</span>
                         {t.isOneTime&&<span style={{marginLeft:4,fontSize:10,background:'#fef3c7',padding:'1px 5px',borderRadius:20,color:'#92400e'}}>1铆職聦</span>}
                       </div>
                       <div style={{display:'flex',alignItems:'center',gap:6}}>
                         <span style={{fontSize:13,fontWeight:800,color:t.type==='income'?'#15803d':'#dc2626'}}>{t.type==='income'?'+':'-'}{$$(t.amount)}</span>
                         <button onClick={()=>delTx(t.id)} style={{background:'none',border:'none',color:'#fca5a5',padding:2,display:'flex'}}><IcoTrash s={12}/></button>
                       </div>
                     </div>
                   ))}
                 </div>
               ))}
             </div>
          }
        </div>

        {/* 矛掳篓铆聤赂 铆聦篓毛聞聬 */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {/* 矛鹿麓铆聟聦锚鲁聽毛娄卢 铆聦聦矛聺麓 */}
          <div style={{background:'white',borderRadius:14,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:8}}>冒聼楼搂 矛鹿麓铆聟聦锚鲁聽毛娄卢毛鲁聞 矛搂聙矛露聹</div>
            {catPie.length>0
              ?<ResponsiveContainer width="100%" height={170}>
                 <PieChart><Pie data={catPie} cx="50%" cy="50%" outerRadius={65} innerRadius={30} dataKey="value" nameKey="name">
                   {catPie.map((e,i)=><Cell key={i} fill={e.fill}/>)}
                 </Pie><Tooltip content={<PieTip/>}/><Legend wrapperStyle={{fontSize:10}}/></PieChart>
               </ResponsiveContainer>
              :<div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',color:'#9ca3af',fontSize:12}}>矛搂聙矛露聹 锚卤掳毛聻聵 矛聴聠矛聺聦</div>
            }
          </div>
          {/* 6锚掳聹矛聸聰 毛鹿聞锚碌聬 */}
          <div style={{background:'white',borderRadius:14,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:'#1f2937',marginBottom:8}}>冒聼聯聤 矛碌聹锚路录 6锚掳聹矛聸聰 毛鹿聞锚碌聬</div>
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={barData} margin={{top:2,right:4,left:-16,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6"/>
                <XAxis dataKey="month" tick={{fontSize:10,fill:'#9ca3af'}}/>
                <YAxis tickFormatter={v=>fmt(v)} tick={{fontSize:9,fill:'#9ca3af'}}/>
                <Tooltip content={<Tip/>}/>
                <Legend wrapperStyle={{fontSize:10}}/>
                <Bar dataKey="income" name="矛聢聵矛聻聟" fill="#34d399" radius={[3,3,0,0]}/>
                <Bar dataKey="expense" name="矛搂聙矛露聹" fill="#f87171" radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

function Dashboard({user,onLogout}){
  const K=k=>`hb_${user}_${k}`;
  const [tab,setTab]=useState('overview');
  const [currentBalance,setCB]=useState(()=>LS.get(K('balance'),0));
  const [savingsGoal,setSG]=useState(()=>LS.get(K('goal'),50000));
  const [projMonths,setPM]=useState(()=>LS.get(K('months'),60));
  const [incomes,setInc]=useState(()=>LS.get(K('incomes'),DEF_INC));
  const [expenses,setExp]=useState(()=>LS.get(K('expenses'),DEF_EXP));
  const [debts,setDbt]=useState(()=>LS.get(K('debts'),DEF_DBT));
  const [investments,setInv]=useState(()=>LS.get(K('investments'),DEF_INV));
  const [transactions,setTx]=useState(()=>LS.get(K('transactions'),DEF_TXN));

  useEffect(()=>LS.set(K('balance'),currentBalance),[currentBalance]);
  useEffect(()=>LS.set(K('goal'),savingsGoal),[savingsGoal]);
  useEffect(()=>LS.set(K('months'),projMonths),[projMonths]);
  useEffect(()=>LS.set(K('incomes'),incomes),[incomes]);
  useEffect(()=>LS.set(K('expenses'),expenses),[expenses]);
  useEffect(()=>LS.set(K('debts'),debts),[debts]);
  useEffect(()=>LS.set(K('investments'),investments),[investments]);
  useEffect(()=>LS.set(K('transactions'),transactions),[transactions]);

  const totalInc=useMemo(()=>incomes.reduce((s,i)=>s+(i.type==='annual'?i.amount/12:i.amount),0),[incomes]);
  const totalExp=useMemo(()=>expenses.reduce((s,e)=>s+e.amount,0),[expenses]);
  const totalDPay=useMemo(()=>debts.reduce((s,d)=>s+d.monthlyPayment,0),[debts]);
  const totalDAmt=useMemo(()=>debts.reduce((s,d)=>s+d.totalAmount,0),[debts]);
  const totalInvBal=useMemo(()=>investments.reduce((s,i)=>s+i.balance,0),[investments]);
  const totalAssets=currentBalance+totalInvBal;
  const netWorth=totalAssets-totalDAmt;
  const netFlow=totalInc-totalExp-totalDPay;

  // 毛炉赂毛聻聵 矛聵聢矛赂隆 (铆聵聞锚赂聢 + 铆聢卢矛聻聬 + 矛聺麓矛聻聬)
  const projData=useMemo(()=>{
    let bal=currentBalance;
    let ds=debts.map(d=>({...d,rem:d.totalAmount}));
    let ivs=investments.map(i=>({...i,bal:i.balance}));
    const rows=[];
    for(let m=0;m<=projMonths;m++){
      const dTotal=ds.reduce((s,d)=>s+Math.max(0,d.rem),0);
      const iTotal=ivs.reduce((s,i)=>s+i.bal,0);
      rows.push({m,label:m===0?'铆聵聞矛聻卢':m%12===0?`${m/12}毛聟聞`:`${m}锚掳聹矛聸聰`,
        balance:Math.round(bal),debt:Math.round(dTotal),investments:Math.round(iTotal),
        netWorth:Math.round(bal+iTotal-dTotal)});
      if(m<projMonths){
        let paid=0;
        ds=ds.map(d=>{
          if(d.rem<=0)return d;
          const interest=d.rem*(d.interestRate/100/12);
          const payment=Math.min(d.monthlyPayment,d.rem+interest);
          paid+=payment;
          return{...d,rem:Math.max(0,d.rem+interest-payment)};
        });
        ivs=ivs.map(i=>({...i,bal:i.bal*(1+i.expectedReturn/100/12)+i.monthlyContribution}));
        bal+=totalInc-totalExp-paid;
      }
    }
    return rows;
  },[currentBalance,debts,investments,projMonths,totalInc,totalExp]);

  const milestones=useMemo(()=>{
    const r=[];
    const g=projData.find(d=>d.netWorth>=savingsGoal);
    if(g) r.push({icon:'冒聼聨炉',label:`矛聢聹矛聻聬矛聜掳 毛陋漏铆聭聹 毛聥卢矛聞卤 (${$$(savingsGoal)})`,month:g.m});
    const df=projData.find(d=>d.debt<=0&&d.m>0);
    if(df) r.push({icon:'冒聼聰聯',label:'毛露聙矛卤聞 矛聶聞矛聽聞 矛聝聛铆聶聵',month:df.m});
    const pn=projData.find(d=>d.netWorth>=0&&d.m>0);
    if(pn&&netWorth<0) r.push({icon:'冒聼聯聢',label:'矛聢聹矛聻聬矛聜掳 铆聰聦毛聼卢矛聤陇 矛聽聞铆聶聵',month:pn.m});
    return r;
  },[projData,savingsGoal,netWorth]);

  const logout=()=>{ Auth.clear(); onLogout(); };
  const reset=()=>{ if(!confirm(`${user}矛聺聵 毛陋篓毛聯聽 毛聧掳矛聺麓铆聞掳毛楼录 矛麓聢锚赂掳铆聶聰铆聲聽锚鹿聦矛職聰?`))return; setCB(0);setSG(50000);setPM(60);setInc(DEF_INC);setExp(DEF_EXP);setDbt(DEF_DBT);setInv(DEF_INV);setTx(DEF_TXN); };

  const TABS=[
    {k:'overview',icon:'冒聼聫聽',label:'毛聦聙矛聥聹毛鲁麓毛聯聹'},
    {k:'ledger',icon:'冒聼聯聮',label:'锚掳聙锚鲁聞毛露聙'},
    {k:'investments',icon:'冒聼聯聢',label:'铆聢卢矛聻聬'},
    {k:'projection',icon:'冒聼聰庐',label:'矛聵聢矛赂隆'},
  ];

  // 矛聝聛毛聥篓 矛鹿麓毛聯聹 毛聧掳矛聺麓铆聞掳
  const cards=[
    {l:'矛聸聰 矛聢聵矛聻聟',v:$$(totalInc),sub:`${incomes.length}锚掳聹 矛聢聵矛聻聟矛聸聬`,c:'#22c55e',border:'#bbf7d0'},
    {l:'矛聸聰 矛搂聙矛露聹 铆聲漏锚鲁聞',v:$$(totalExp+totalDPay),sub:`锚鲁聽矛聽聲 ${$$(totalExp)} + 毛露聙矛卤聞 ${$$(totalDPay)}`,c:'#ef4444',border:'#fecaca'},
    {l:'矛聸聰 矛聢聹 铆聵聞锚赂聢铆聺聬毛娄聞',v:(netFlow>=0?'+':'')+$$(netFlow),sub:netFlow>=0?'冒聼聮職 矛聽聙矛露聲 锚掳聙毛聤楼':'芒職聽茂赂聫 矛搂聙矛露聹 矛麓聢锚鲁录',c:netFlow>=0?'#3b82f6':'#f97316',border:netFlow>=0?'#bfdbfe':'#fed7aa'},
    {l:'铆聢卢矛聻聬 矛聻聰锚鲁聽',v:$$(totalInvBal),sub:`${investments.length}锚掳聹 锚鲁聞矛垄聦`,c:'#8b5cf6',border:'#ddd6fe'},
    {l:'矛麓聺 矛聻聬矛聜掳',v:$$(totalAssets),sub:`铆聵聞锚赂聢 ${$$(currentBalance)} + 铆聢卢矛聻聬 ${$$(totalInvBal)}`,c:'#4f46e5',border:'#ddd6fe'},
    {l:'矛聢聹矛聻聬矛聜掳 (Net Worth)',v:$$(netWorth),sub:`矛麓聺矛聻聬矛聜掳 - 毛露聙矛卤聞 ${$$(totalDAmt)}`,c:netWorth>=0?'#c9a84c':'#ef4444',border:netWorth>=0?'#fef3c7':'#fecaca'},
  ];

  return(
    <div style={{minHeight:'100vh',background:'#f5f3ff'}}>
      {/* 铆聴陇毛聧聰 */}
      <div style={{background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',padding:'14px 20px'}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{color:'#c9a84c',fontSize:20,fontWeight:900,letterSpacing:2,lineHeight:1}}>HILLIARD BUFFSHIRE</div>
            <div style={{color:'#67e8f9',fontSize:10,letterSpacing:4,marginTop:4,fontWeight:800}}>PERSONAL FINANCE DASHBOARD</div>
            <div style={{color:'rgba(255,255,255,0.85)',fontSize:13,letterSpacing:1,fontWeight:500,marginTop:3}}>铆聻聬毛娄卢矛聲聞毛聯聹 毛虏聞铆聰聞矛聟聰 矛聻卢毛卢麓 锚麓聙毛娄卢 矛聤陇铆聟聦矛聺麓矛聟聵</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',background:'rgba(167,139,250,0.2)',border:'1px solid rgba(167,139,250,0.4)',borderRadius:20,color:'#c9a84c',fontSize:13,fontWeight:700}}>
              <IcoUser s={13}/>{user.charAt(0).toUpperCase()+user.slice(1)}
            </div>
            <button onClick={reset} style={{padding:'6px 10px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:20,color:'#94a3b8',fontSize:11,fontWeight:600}}>矛麓聢锚赂掳铆聶聰</button>
            <button onClick={logout} style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:20,color:'#94a3b8',fontSize:12,fontWeight:600}}>
              <IcoOut s={13}/>毛隆聹锚路赂矛聲聞矛聸聝
            </button>
          </div>
        </div>
      </div>

      {/* 矛聢聹矛聻聬矛聜掳 铆聲聵矛聺麓毛聺录矛聺麓铆聤赂 毛掳聰 */}
      <div style={{background:'linear-gradient(135deg,#764ba2,#4f46e5)',padding:'13px 20px',borderBottom:'1px solid rgba(167,139,250,0.3)'}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{color:'rgba(255,255,255,0.85)',fontSize:13,fontWeight:600,letterSpacing:0.5}}>矛聢聹矛聻聬矛聜掳 (Net Worth)</span>
          <span style={{color:netWorth>=0?'#fde68a':'#fca5a5',fontSize:27,fontWeight:900,letterSpacing:1}}>{$$(netWorth)}</span>
          <span style={{color:'rgba(255,255,255,0.55)',fontSize:12}}>= {$$(totalAssets)} 芒聢聮 {$$(totalDAmt)}</span>
        </div>
      </div>

      {/* 铆聝颅 毛聞陇毛鹿聞锚虏聦矛聺麓矛聟聵 */}
      <div style={{background:'white',borderBottom:'1px solid #e2e8f0',position:'sticky',top:0,zIndex:10}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex'}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{flex:1,padding:'12px 8px',border:'none',background:'none',fontSize:13,fontWeight:700,
                color:tab===t.k?'#4f46e5':'#6b7280',borderBottom:tab===t.k?'3px solid #c9a84c':'3px solid transparent',
                transition:'all .2s',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
              <span>{t.icon}</span><span className="tab-label-long">{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* 毛漏聰矛聺赂 矛陆聵铆聟聬矛赂聽 */}
      <div style={{maxWidth:1120,margin:'0 auto',padding:'16px'}}>
        {/* 矛職聰矛聲陆 矛鹿麓毛聯聹 6锚掳聹 */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}} className="cards-grid">
          {cards.map((c,i)=>(
            <div key={i} style={{background:'white',borderRadius:12,padding:'12px 14px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',borderLeft:`4px solid ${c.border}`}}>
              <div style={{fontSize:11,color:'#9ca3af',fontWeight:700,letterSpacing:1,marginBottom:3}}>{c.l.toUpperCase()}</div>
              <div style={{fontSize:19,fontWeight:900,color:c.c,lineHeight:1.1}}>{c.v}</div>
              <div style={{fontSize:11,color:'#9ca3af',marginTop:3}}>{c.sub}</div>
            </div>
          ))}
        </div>

        {/* 铆聝颅 矛陆聵铆聟聬矛赂聽 */}
        {tab==='overview'&&<OverviewTab incomes={incomes} setInc={setInc} expenses={expenses} setExp={setExp} debts={debts} setDbt={setDbt} totalInc={totalInc} totalExp={totalExp} totalDPay={totalDPay} netFlow={netFlow} transactions={transactions}/>}
        {tab==='ledger'&&<LedgerTab transactions={transactions} setTx={setTx}/>}
        {tab==='investments'&&<InvestmentTab investments={investments} setInv={setInv}/>}
        {tab==='projection'&&<ProjectionTab currentBalance={currentBalance} setCB={setCB} savingsGoal={savingsGoal} setSG={setSG} projMonths={projMonths} setPM={setPM} projData={projData.filter((_,i)=>i%Math.max(1,Math.floor(projMonths/20))===0)} milestones={milestones} totalInc={totalInc} totalExp={totalExp} totalDPay={totalDPay}/>}

        <div style={{textAlign:'center',fontSize:10,color:'#cbd5e1',marginTop:20,paddingBottom:20}}>
          Hilliard Buffshire Personal Finance Dashboard 脗路 毛聧掳矛聺麓铆聞掳毛聤聰 毛赂聦毛聺录矛職掳矛聽聙矛聴聬 矛聽聙矛聻楼毛聬漏毛聥聢毛聥陇
        </div>
      </div>
    </div>
  );
}

/* 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
   13. APP ROOT
芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬 */
function App(){
  const [user,setUser]=useState(()=>Auth.session());
  const login=(u)=>setUser(u);
  const logout=()=>setUser(null);
  if(!user)return <AuthScreen onLogin={login}/>;
  return <Dashboard user={user} onLogout={logout}/>;
}

document.getElementById('loading').style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
