function getInvestmentInsight(investments){
if(investments.length===0)
return{emoji:'🌱',msg:'투자를 시작하면 돈이 나 대신 일하기 시작해요! 소액도 괜찮아요.',color:'#6366f1',bg:'#ede9fe'};
const totalBal=investments.reduce((s,i)=>s+i.balance,0);
const avgR=totalBal>0?investments.reduce((s,i)=>s+i.expectedReturn*i.balance,0)/totalBal:0;
const best=investments.reduce((a,b)=>b.expectedReturn>a.expectedReturn?b:a,investments[0]);
const types=new Set(investments.map(i=>i.type)).size;
if(investments.length>=3&&types>=2)
return{emoji:'🌈',msg:`${investments.length}개 계좌 분산 투자 중! 리스크 관리가 훌륭해요.`,color:'#16a34a',bg:'#f0fdf4',sub:`평균 예상 수익률 ${avgR.toFixed(1)}% · 최고 ${best.name} ${best.expectedReturn}%`};
if(avgR>=15)
return{emoji:'🚀',msg:`${best.name} 예상 수익률 ${best.expectedReturn}%! 공격적 투자 전략이에요.`,color:'#7c3aed',bg:'#f5f3ff',sub:'높은 수익엔 높은 리스크, 분산 투자도 고려해보세요'};
if(avgR>=7)

function Dashboard({user, onLogout, theme, themeIdx, setThemeIdx, lang, setLang}){

const [currentBalance,setCB]=useState(()=>LS.get(CK('balance'),0));

const [projMonths,setPM]=useState(()=>LS.get(CK('months'),60));
const [incomes,setInc]=useState(()=>LS.get(CK('incomes'),DEF_INC));
const [expenses,setExp]=useState(()=>LS.get(CK('expenses'),DEF_EXP));
const [debts,setDbt]=useState(()=>LS.get(CK('debts'),DEF_DBT));
const [investments,setInv]=useState(()=>LS.get(CK('investments'),DEF_INV));
const [transactions,setTx]=useState(()=>LS.get(CK('transactions'),DEF_TXN));
const [cashAccounts,setCashAccts]=useState(()=>LS.get(CK('cashAccounts'),[]));
const [showCashAccts,setShowCashAccts]=useState(false);
const [syncStatus,setSyncStatus]=useState(''); // '', 'saving', 'saved', 'error'
const [showThemePicker,setShowThemePicker]=useState(false);
const [quoteIdx,setQuoteIdx]=useState(()=>Math.floor(Math.random()*FINANCE_QUOTES.length));
const saveEnabled = useRef(false);
const saveTimer = useRef(null);
useEffect(()=>{
if(!db||!user){ saveEnabled.current=true; return; }
db.collection('users').doc(user).get()
.then(doc=>{
if(doc.exists){
const d=doc.data();
if(d.balance!=null) setCB(d.balance);
if(d.goal!=null) setSG(d.goal);
if(d.months!=null) setPM(d.months);
if(d.incomes) setInc(d.incomes);
if(d.expenses) setExp(d.expenses);
if(d.debts) setDbt(d.debts);
if(d.investments) setInv(d.investments);
if(d.transactions) setTx(d.transactions);
if(d.cashAccounts) setCashAccts(d.cashAccounts);
}
})
.catch(e=>console.warn('Firestore load:', e))
.finally(()=>{
setTimeout(()=>{ saveEnabled.current=true; }, 1000);
});
},[user]);
useEffect(()=>{
if(!saveEnabled.current) return;
LS.set(CK('balance'),currentBalance);
LS.set(CK('goal'),savingsGoal);
LS.set(CK('months'),projMonths);
LS.set(CK('incomes'),incomes);
LS.set(CK('expenses'),expenses);
LS.set(CK('debts'),debts);
LS.set(CK('investments'),investments);
LS.set(CK('transactions'),transactions);
LS.set(CK('cashAccounts'),cashAccounts);
if(!db||!user) return;
setSyncStatus('saving');
if(saveTimer.current) clearTimeout(saveTimer.current);
saveTimer.current=setTimeout(()=>{
db.collection('users').doc(user).set({
balance:currentBalance, goal:savingsGoal, months:projMonths,
incomes, expenses, debts, investments, transactions, cashAccounts,
updatedAt: new Date().toISOString()
})
.then(()=>setSyncStatus('saved'))
.catch(e=>{ console.warn('Firestore save:', e); setSyncStatus('error'); });
}, 2000);
},[currentBalance,savingsGoal,projMonths,incomes,expenses,debts,investments,transactions,cashAccounts]);
useEffect(()=>{
document.body.style.background=theme.pageBg;
document.documentElement.style.setProperty('--focus-color',theme.focus);
},[theme]);
useEffect(()=>{const t=setInterval(()=>setQuoteIdx(i=>(i+1)%FINANCE_QUOTES.length),9000);return()=>clearInterval(t);},[]);
useEffect(()=>{
const apply=()=>{
const ym=monthKey();
const sk=CK('sched_'+ym);
const applied=LS.get(sk,[]);
const today=new Date().getDate();
const due=expenses.filter(e=>e.day&&Number(e.day)<=today&&!applied.includes(e.id));
if(!due.length)return;
const deduction=due.reduce((s,e)=>s+e.amount,0);
LS.set(sk,[...applied,...due.map(e=>e.id)]);
if(cashAccounts.length===0){
setCB(p=>Math.round((p-deduction)*100)/100);
}else{
const idx=cashAccounts.findIndex(a=>a.assetType!=='investment');
if(idx>=0)setCashAccts(p=>p.map((a,i)=>i===idx?{...a,balance:Math.round((a.balance-deduction)*100)/100}:a));
else setCB(p=>Math.round((p-deduction)*100)/100);
}
};
const t=setTimeout(apply,1600);
return()=>clearTimeout(t);
},[expenses.map(e=>e.id+'_'+(e.day||0)).join('|')]);
const totalInc=useMemo(()=>incomes.reduce((s,i)=>s+(i.type==='annual'?i.amount/12:i.amount),0),[incomes]);
const totalExp=useMemo(()=>expenses.reduce((s,e)=>s+e.amount,0),[expenses]);
const totalDPay=useMemo(()=>debts.reduce((s,d)=>s+d.monthlyPayment,0),[debts]);
const totalDAmt=useMemo(()=>debts.reduce((s,d)=>s+d.totalAmount,0),[debts]);
const linkedInvBal=useMemo(()=>cashAccounts.filter(a=>a.assetType==='investment').reduce((s,a)=>s+a.balance,0),[cashAccounts]);
const totalInvBal=useMemo(()=>investments.reduce((s,i)=>s+i.balance,0)+linkedInvBal,[investments,linkedInvBal]);
const effectiveBalance=useMemo(()=>{if(cashAccounts.length===0)return currentBalance;return cashAccounts.filter(a=>a.assetType!=='investment').reduce((s,a)=>s+a.balance,0);},[cashAccounts,currentBalance]);
const totalAssets=effectiveBalance+totalInvBal;
const netWorth=totalAssets-totalDAmt;
const netFlow=totalInc-totalExp-totalDPay;
const projData=useMemo(()=>{
let bal=effectiveBalance;
let ds=debts.map(d=>({...d,rem:d.totalAmount}));
let ivs=investments.map(i=>({...i,bal:i.balance}));
const rows=[];
for(let m=0;m<=projMonths;m++){
const dTotal=ds.reduce((s,d)=>s+Math.max(0,d.rem),0);
const iTotal=ivs.reduce((s,i)=>s+i.bal,0);
rows.push({m,label:m===0?'현재':m%12===0?`${m/12}년`:`${m}개월`,
balance:Math.round(bal),debt:Math.round(dTotal),investments:Math.round(iTotal),
netWorth:Math.round(bal+iTotal-dTotal)});
if(m<projMonths){
let paid=0;
ds=ds.map(d=>{
if(d.rem<=0)return d;
const interest=d.rem*(d.interestRate/100/12);
const payment=Math.min(d.monthlyPayment,d.rem+interest);
paid+=payment;
return{...d,rem:Math.max(0,d.rem+interest-payment)};
});
ivs=ivs.map(i=>({...i,bal:i.bal*(1+i.expectedReturn/100/12)+i.monthlyContribution}));
bal+=totalInc-totalExp-paid;
}
}
return rows;
},[currentBalance,debts,investments,projMonths,totalInc,totalExp]);
const milestones=useMemo(()=>{
const r=[];
const g=projData.find(d=>d.netWorth>=savingsGoal);
if(g) r.push({icon:'🎯',label:`순자산 목표 달성 (${$$(savingsGoal)})`,month:g.m});
const df=projData.find(d=>d.debt<=0&&d.m>0);
if(df) r.push({icon:'🔓',label:'부채 완전 상환',month:df.m});
const pn=projData.find(d=>d.netWorth>=0&&d.m>0);
if(pn&&netWorth<0) r.push({icon:'📈',label:'순자산 플러스 전환',month:pn.m});
return r;
},[projData,savingsGoal,netWorth]);
const logout=()=>{ onLogout(); };

];
return(

class ErrorBoundary extends React.Component{
constructor(p){super(p);this.state={err:null};}
static getDerivedStateFromError(e){return{err:e};}
render(){
if(this.state.err){
return React.createElement('div',{style:{padding:24,color:'#dc2626',background:'#fee2e2',margin:24,borderRadius:12,fontSize:14}},
'❌ React 렌더링 오류: ',this.state.err.message,
React.createElement('pre',{style:{fontSize:11,marginTop:8,overflow:'auto',whiteSpace:'pre-wrap'}},this.state.err.stack)
);
}
return this.props.children;
}
}

}
